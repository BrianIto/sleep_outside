<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Checkout</title>
    <link rel="stylesheet" href="/css/style.css" />
    <script src="/js/main.js" type="module"></script>
    <script src="/js/checkout.js" type="module"></script>
  </head>
  <body>
    <header class="divider"></header>
    <main class="divider checkout-page">
      <h1>Review &amp; Place Your Order</h1>
      <div class="checkout-layout">
        <form name="checkout" class="checkout-form">
          <fieldset>
            <legend>Customer Name</legend>
            <label for="fname">First Name</label>
            <input
              id="fname"
              name="fname"
              type="text"
              autocomplete="given-name"
              required
            />

            <label for="lname">Last Name</label>
            <input
              id="lname"
              name="lname"
              type="text"
              autocomplete="family-name"
              required
            />
          </fieldset>

          <fieldset>
            <legend>Address</legend>
            <label for="street">Street Address</label>
            <input
              id="street"
              name="street"
              type="text"
              autocomplete="street-address"
              required
            />

            <label for="city">City</label>
            <input
              id="city"
              name="city"
              type="text"
              autocomplete="address-level2"
              required
            />

            <div class="address-row">
              <div>
                <label for="state">State</label>
                <input
                  id="state"
                  name="state"
                  type="text"
                  autocomplete="address-level1"
                  pattern="[A-Za-z]{2}"
                  maxlength="2"
                  title="Enter a two-letter state abbreviation"
                  required
                />
              </div>
              <div>
                <label for="zip">Zip Code</label>
                <input
                  id="zip"
                  name="zip"
                  type="text"
                  inputmode="numeric"
                  autocomplete="postal-code"
                  pattern="[0-9]{5}(-[0-9]{4})?"
                  required
                />
              </div>
            </div>
          </fieldset>

          <fieldset>
            <legend>Payment</legend>
            <label for="cardNumber">Credit Card Number</label>
            <input
              id="cardNumber"
              name="cardNumber"
              type="text"
              inputmode="numeric"
              autocomplete="cc-number"
              pattern="[0-9]{16}"
              maxlength="16"
              required
            />

            <div class="payment-row">
              <div>
                <label for="expiration">Expiration Date</label>
                <input
                  id="expiration"
                  name="expiration"
                  type="text"
                  inputmode="numeric"
                  autocomplete="cc-exp"
                  placeholder="MM/YY"
                  pattern="(0?[1-9]|1[0-2])/[0-9]{2}"
                  required
                />
              </div>
              <div>
                <label for="code">Security Code</label>
                <input
                  id="code"
                  name="code"
                  type="text"
                  inputmode="numeric"
                  autocomplete="cc-csc"
                  pattern="[0-9]{3,4}"
                  maxlength="4"
                  required
                />
              </div>
            </div>
          </fieldset>

          <button type="submit">Checkout</button>
          <p
            id="checkout-status"
            class="checkout-status"
            aria-live="polite"
          ></p>
        </form>

        <aside class="order-summary" aria-labelledby="summary-heading">
          <h2 id="summary-heading">Order Summary</h2>
          <dl>
            <div>
              <dt>Subtotal</dt>
              <dd id="subtotal">$0.00</dd>
            </div>
            <div>
              <dt>Tax</dt>
              <dd id="tax">Enter zip code</dd>
            </div>
            <div>
              <dt>Shipping Estimate</dt>
              <dd id="shipping">Enter zip code</dd>
            </div>
            <div class="order-total">
              <dt>Order Total</dt>
              <dd id="orderTotal">Enter zip code</dd>
            </div>
          </dl>
        </aside>
      </div>
    </main>
    <footer></footer>
  </body>
</html>
